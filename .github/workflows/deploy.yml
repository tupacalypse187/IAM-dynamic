name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/iam-dynamic-frontend
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/iam-dynamic-backend
  CADDY_IMAGE: ghcr.io/${{ github.repository_owner }}/iam-dynamic-caddy

jobs:
  security:
    name: Security & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Frontend checks
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend audit & build
        working-directory: frontend
        run: |
          npm ci
          npm audit --audit-level=high || true
          npm run lint
          npx tsc -b --noEmit
          npm run build

      # Backend checks
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Backend lint
        working-directory: backend
        run: |
          pip install -r requirements.txt ruff
          ruff check .

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: security
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend build test
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Backend tests
        working-directory: backend
        run: |
          pip install -r requirements.txt pytest
          pytest --tb=short -q || true

  build-images:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [security, test]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Frontend image
      - name: Frontend image metadata
        id: frontend-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: ${{ steps.frontend-meta.outputs.tags }}
          labels: ${{ steps.frontend-meta.outputs.labels }}
          build-args: |
            VITE_TURNSTILE_SITE_KEY=${{ secrets.TURNSTILE_SITE_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Backend image
      - name: Backend image metadata
        id: backend-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.backend
          push: true
          tags: ${{ steps.backend-meta.outputs.tags }}
          labels: ${{ steps.backend-meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Caddy image
      - name: Caddy image metadata
        id: caddy-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.CADDY_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push caddy
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.caddy
          push: true
          tags: ${{ steps.caddy-meta.outputs.tags }}
          labels: ${{ steps.caddy-meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Security scan — install trivy via apt repository
      - name: Install Trivy
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy
          trivy --version

      - name: Trivy scan frontend
        run: trivy image --severity CRITICAL,HIGH --exit-code 0 ${{ env.FRONTEND_IMAGE }}:latest
        continue-on-error: true

      - name: Trivy scan backend
        run: trivy image --severity CRITICAL,HIGH --exit-code 0 ${{ env.BACKEND_IMAGE }}:latest
        continue-on-error: true

      - name: Trivy scan caddy
        run: trivy image --severity CRITICAL,HIGH --exit-code 0 ${{ env.CADDY_IMAGE }}:latest
        continue-on-error: true

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-images
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/iam-dynamic
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            echo "Waiting for health checks..."
            sleep 10
            docker compose -f docker-compose.prod.yml exec -T frontend wget -qO- http://localhost:8080/nginx-health || exit 1
            docker compose -f docker-compose.prod.yml exec -T frontend wget -qO- http://localhost:8080/health || exit 1
            echo "Deployment healthy"

  cleanup:
    name: Cleanup
    runs-on: ubuntu-latest
    needs: deploy
    if: always() && needs.deploy.result == 'success'
    steps:
      - name: Remove old frontend images
        uses: actions/delete-package-versions@v5
        with:
          package-name: iam-dynamic-frontend
          package-type: container
          min-versions-to-keep: 3
        continue-on-error: true

      - name: Remove old backend images
        uses: actions/delete-package-versions@v5
        with:
          package-name: iam-dynamic-backend
          package-type: container
          min-versions-to-keep: 3
        continue-on-error: true

      - name: Remove old caddy images
        uses: actions/delete-package-versions@v5
        with:
          package-name: iam-dynamic-caddy
          package-type: container
          min-versions-to-keep: 3
        continue-on-error: true

      - name: Slack notification
        uses: slackapi/slack-github-action@v2.0.0
        continue-on-error: true
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "IAM-Dynamic deployed successfully :rocket:\nCommit: ${{ github.sha }}\nBy: ${{ github.actor }}"
            }
